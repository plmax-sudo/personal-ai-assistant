# SearXNG settings

use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "ultrasecretkeyforsearxng"
  limiter: false
  image_proxy: true

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

# Explicitly enable engines that are usually stable
engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: w
  - name: bing
    engine: bing
    shortcut: b

enabled_plugins:
  - 'Hash plugin'
  - 'Self Information'
  - 'Tracker-aware link proxy'
  - 'Open Access DOI rewrite'

bot_detection:
  enabled: false

outgoing:
  request_timeout: 10.0
  user_agent_topology: 'chrome'
